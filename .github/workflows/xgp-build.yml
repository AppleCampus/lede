name: XGPv3 Build

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 18 * * 4'   # 周五北京时间 02:00，需要时再开

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      TZ: Asia/Shanghai
      FORCE_UNSAFE_CONFIGURE: 1
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          # 给编译盘尽量多空间；root 只留 4G 系统
          root-reserve-mb: 4096
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Free more space + show disk
        run: |
          set -e
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          sudo apt-get clean || true
          df -h
          free -h

      - name: Checkout LEDE fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: lede

      - name: Install build deps (minimal, no texlive)
        run: |
          set -e
          sudo apt-get update -y
          # 不要装 asciidoc/xmlto/texinfo 全量文档链，会拖进 texlive 把盘撑爆
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libncursesw5-dev libssl-dev \
            libelf-dev zlib1g-dev \
            python3 python3-setuptools python3-pyelftools \
            rsync unzip wget curl file swig \
            ccache cmake ninja-build \
            device-tree-compiler patch pkgconf \
            squashfs-tools genisoimage qemu-utils \
            libgmp3-dev libmpfr-dev libmpc-dev \
            uuid-runtime time
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Cache dl / staging
        uses: actions/cache@v4
        with:
          path: |
            lede/dl
            lede/staging_dir/host
            lede/staging_dir/hostpkg
            lede/staging_dir/toolchain-*
          key: xgp-${{ runner.os }}-${{ hashFiles('lede/feeds.conf.default', 'lede/xgp.config') }}

      - name: Prepare feeds / packages / files
        working-directory: lede
        run: |
          set -e
          bash scripts/xgp-prepare.sh
          df -h

      - name: Build
        working-directory: lede
        run: |
          set -e
          bash scripts/xgp-build.sh
          df -h

      - name: Collect artifacts
        run: |
          set -e
          mkdir -p release_assets
          cp lede/bin/targets/rockchip/armv8/*.img.gz release_assets/ || true
          cp lede/bin/targets/rockchip/armv8/*.manifest release_assets/ || true
          cp lede/bin/targets/rockchip/armv8/config.buildinfo release_assets/ || true
          cp lede/bin/targets/rockchip/armv8/feeds.buildinfo release_assets/ || true
          cp lede/bin/targets/rockchip/armv8/version.buildinfo release_assets/ || true
          cp lede/bin/targets/rockchip/armv8/sha256sums release_assets/ || true
          ls -lah release_assets
          test -n "$(ls release_assets/*.img.gz 2>/dev/null)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgpv3-firmware
          path: release_assets/
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xgp-${{ github.run_number }}-${{ github.run_id }}
          name: XGPv3 ${{ github.run_number }} (${{ github.sha }})
          files: release_assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
