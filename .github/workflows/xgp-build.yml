name: XGPv3 Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 4'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      TZ: Asia/Shanghai
      FORCE_UNSAFE_CONFIGURE: 1
      UPSTREAM_REPO: https://github.com/coolsnowwolf/lede.git
      UPSTREAM_BRANCH: master
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Free more space + show disk
        run: |
          set -e
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          sudo apt-get clean || true
          df -h
          free -h

      - name: Checkout LEDE fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: lede

      - name: Sync latest upstream source
        working-directory: lede
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          custom_dir=/tmp/xgp-custom
          upstream_dir=/tmp/lede-upstream
          rm -rf "$custom_dir" "$upstream_dir"

          for path in \
            .github/workflows/xgp-build.yml \
            feeds.conf.default \
            xgp.config \
            scripts/xgp-prepare.sh \
            scripts/xgp-build.sh \
            scripts/xgp-apply-patches.sh; do
            mkdir -p "$custom_dir/$(dirname "$path")"
            cp "$path" "$custom_dir/$path"
          done

          git clone --depth 1 --branch "$UPSTREAM_BRANCH" "$UPSTREAM_REPO" "$upstream_dir"
          UPSTREAM_SHA=$(git -C "$upstream_dir" rev-parse HEAD)
          rsync -a --delete --exclude='.git/' "$upstream_dir/" ./

          for path in \
            .github/workflows/xgp-build.yml \
            feeds.conf.default \
            xgp.config \
            scripts/xgp-prepare.sh \
            scripts/xgp-build.sh \
            scripts/xgp-apply-patches.sh; do
            mkdir -p "$(dirname "$path")"
            cp "$custom_dir/$path" "$path"
          done

          bash scripts/xgp-apply-patches.sh
          git diff --check -- scripts/xgp-apply-patches.sh

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Sync upstream LEDE $UPSTREAM_SHA"
          fi
          git push origin HEAD:master
          echo "SYNCED_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "UPSTREAM_SHA=$UPSTREAM_SHA" >> "$GITHUB_ENV"
          echo "Synced source commit: $(git rev-parse HEAD)"
          echo "Upstream source: $UPSTREAM_SHA"

      - name: Install build deps (minimal, no texlive)
        run: |
          set -e
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libncursesw5-dev libssl-dev \
            libelf-dev zlib1g-dev \
            python3 python3-setuptools python3-pyelftools \
            rsync unzip wget curl file swig \
            ccache cmake ninja-build \
            device-tree-compiler patch pkgconf \
            squashfs-tools genisoimage qemu-utils \
            libgmp3-dev libmpfr-dev libmpc-dev \
            uuid-runtime time
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Cache dl / staging
        uses: actions/cache@v4
        with:
          path: |
            lede/dl
            lede/staging_dir/host
            lede/staging_dir/hostpkg
            lede/staging_dir/toolchain-*
          key: xgp-${{ runner.os }}-${{ hashFiles('lede/feeds.conf.default', 'lede/xgp.config') }}

      - name: Prepare feeds / packages / files
        working-directory: lede
        run: |
          set -e
          bash scripts/xgp-prepare.sh
          df -h

      - name: Build
        working-directory: lede
        run: |
          set -e
          bash scripts/xgp-build.sh
          df -h

      - name: Collect artifacts
        run: |
          set -e
          mkdir -p release_assets
          cp lede/bin/targets/rockchip/armv8/*.img.gz release_assets/
          cp lede/bin/targets/rockchip/armv8/*.manifest release_assets/ || true
          cp lede/bin/targets/rockchip/armv8/config.buildinfo release_assets/ || true
          cp lede/bin/targets/rockchip/armv8/feeds.buildinfo release_assets/ || true
          cp lede/bin/targets/rockchip/armv8/version.buildinfo release_assets/ || true
          cp lede/bin/targets/rockchip/armv8/sha256sums release_assets/ || true
          cp lede/.config release_assets/xgp.config.final
          cp lede/feeds.conf release_assets/feeds.conf.final
          cp lede/README.md release_assets/LEDE-README.md || true
          cp lede/LICENSE release_assets/LEDE-LICENSE || true
          curl -fsSL https://www.gnu.org/licenses/old-licenses/gpl-2.0.txt \
            -o release_assets/GPL-2.0.txt
          test -s release_assets/GPL-2.0.txt
          printf 'AppleCampus/lede commit: %s\nUpstream source: %s\nBuild run: %s\n' \
            "$SYNCED_SHA" \
            "$UPSTREAM_REPO@$UPSTREAM_SHA" \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            > release_assets/SOURCE-OFFER.txt
          sha256sum release_assets/*.img.gz > release_assets/sha256sums.release
          ls -lah release_assets
          test -n "$(ls release_assets/*.img.gz)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgpv3-firmware
          path: release_assets/
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xgp-${{ github.run_number }}-${{ github.run_id }}
          target_commitish: ${{ env.SYNCED_SHA }}
          name: XGPv3 ${{ github.run_number }} (${{ env.SYNCED_SHA }})
          body: |
            ## XGP V3 firmware

            Built from AppleCampus/lede commit `${{ env.SYNCED_SHA }}` after syncing upstream commit `${{ env.UPSTREAM_SHA }}`.

            Includes XGP V3 screen support and the full Wi-Fi driver set, including MT7922 firmware support.

            License: GNU General Public License v2.0 (GPL-2.0).
            The release includes the complete `GPL-2.0.txt`, source/config metadata, and checksums.
          files: release_assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
